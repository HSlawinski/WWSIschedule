<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Plan Zajęć</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Plan Z201">
    <meta name="theme-color" content="#142538">   

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body data-theme="dark">

    <header>
        <h1>Z201 <i class="fa-solid fa-user-graduate"></i></h1>
        <button id="theme-toggle">☀️</button>
    </header>

    <div id="app">
        <div id="komunikaty-rss">
            <div class="zjazd-header" onclick="toggleRSS()">
                <div class="zjazd-title-container">
                    <span><i class="fa-solid fa-bell"></i> Komunikacja</span>
                    <span id="rss-count" class="zjazd-dates">0</span>
                </div>
                <span id="rss-toggle-icon" class="toggle-icon" style="transform: rotate(-90deg);">▼</span>
            </div>
            
            <div id="rss-content" class="zjazd-content" style="display: none;">
                <div style="padding: 10px; text-align: center; color: var(--text-muted);">Ładowanie komunikatów...</div>
            </div>
        </div>

        <div id="plan-zajec">
            <div class="loader">Ładowanie najświeższego planu...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
