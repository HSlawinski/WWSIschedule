<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Plan Zajęć</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body data-theme="dark">

    <header>
        <h1>Z201 <i class="fa-solid fa-user-graduate"></i></h1>
        <button id="theme-toggle">☀️</button>
    </header>

    <div id="app">
        <div id="komunikaty-rss">
            <div class="zjazd-header" onclick="toggleRSS()">
                <div class="zjazd-title-container">
                    <span><i class="fa-solid fa-bell"></i> Komunikacja</span>
                    <span id="rss-count" class="zjazd-dates">0</span>
                </div>
                <span id="rss-toggle-icon" class="toggle-icon" style="transform: rotate(-90deg);">▼</span>
            </div>
            
            <div id="rss-content" class="zjazd-content" style="display: none;">
                <div style="padding: 10px; text-align: center; color: var(--text-muted);">Ładowanie komunikatów...</div>
            </div>
        </div>

        <div id="plan-zajec">
            <div class="loader">Ładowanie najświeższego planu...</div>
        </div>
    </div>

    <script>
        const urlGoogleSheets = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Egljaq9wqp3oBnK50-ynJ4mygw-Rf0z19qQB05lmVljVljsjLs-4p4L8sNZh0FZUxHr8WTYKKqOi/pub?output=csv';

        // Obsługa trybu ciemnego
        const themeToggle = document.getElementById('theme-toggle');
        let isDark = localStorage.getItem('theme') !== 'light'; 
        
        if(!isDark) document.body.removeAttribute('data-theme');
        themeToggle.textContent = isDark ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            if (isDark) {
                document.body.setAttribute('data-theme', 'dark');
            } else {
                document.body.removeAttribute('data-theme');
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // Globalna funkcja do zwijania/rozwijania zjazdów
        window.toggleZjazd = function(nrZjazdu) {
            const content = document.getElementById(`zjazd-content-${nrZjazdu}`);
            const icon = document.getElementById(`icon-${nrZjazdu}`);
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                icon.style.transform = 'rotate(0deg)'; 
            } else {
                content.style.display = 'none';
                icon.style.transform = 'rotate(-90deg)'; 
            }
        };

        function getTypZajecHTML(nazwa) {
            const lower = nazwa.toLowerCase();
            if (lower.includes('wykł')) return `<span class="badge badge-wykl">WYKŁAD</span>`;
            if (lower.includes('ćw')) return `<span class="badge badge-cw">ĆWICZENIA</span>`;
            if (lower.includes('lab')) return `<span class="badge badge-lab">LABORATORIUM</span>`;
            return '';
        }

        function cleanNazwa(nazwa) {
            return nazwa.replace(/wykł\.|ćw\.|lab\./gi, '').trim();
        }

        // ==========================================
        // 1. ŁADOWANIE PLANU ZAJĘĆ
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const app = document.getElementById('plan-zajec');
                
                const zjazdyResponse = await fetch('zjazdy.json');
                if (!zjazdyResponse.ok) throw new Error('Nie znaleziono pliku zjazdy.json');
                const zjazdyDaty = await zjazdyResponse.json();

                Papa.parse(urlGoogleSheets, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const planDane = results.data;
                        let suroweZajecia = [];

                        planDane.forEach(surowyWiersz => {
                            const wiersz = {};
                            for (let key in surowyWiersz) {
                                let czystyKlucz = key.trim().toLowerCase().replace('ń', 'n').replace('ź', 'z');
                                wiersz[czystyKlucz] = surowyWiersz[key];
                            }

                            if(!wiersz.zjazdy || !wiersz.dzien) return;

                            const zjazdyLista = String(wiersz.zjazdy).split(',').map(z => z.trim());
                            const czystyDzien = String(wiersz.dzien).trim();

                            zjazdyLista.forEach(nrZjazdu => {
                                if(zjazdyDaty[nrZjazdu] && zjazdyDaty[nrZjazdu][czystyDzien]) {
                                    suroweZajecia.push({
                                        zjazd: parseInt(nrZjazdu),
                                        dzien: czystyDzien,
                                        data: zjazdyDaty[nrZjazdu][czystyDzien],
                                        od: String(wiersz.od || '').trim().replace('.', ':').padStart(5, '0'),
                                        do: String(wiersz.do || '').trim().replace('.', ':').padStart(5, '0'),
                                        przedmiot: String(wiersz.przedmiot || '').trim(),
                                        sala: String(wiersz.sala || '').trim()
                                    });
                                }
                            });
                        });

                        suroweZajecia.sort((a, b) => {
                            if (a.zjazd !== b.zjazd) return a.zjazd - b.zjazd;
                            if (a.data !== b.data) return a.data.localeCompare(b.data);
                            return a.od.localeCompare(b.od);
                        });

                        app.innerHTML = ''; 

                        const zjazdyPogrupowane = {};
                        suroweZajecia.forEach(zajecia => {
                            if (!zjazdyPogrupowane[zajecia.zjazd]) {
                                zjazdyPogrupowane[zajecia.zjazd] = [];
                            }
                            zjazdyPogrupowane[zajecia.zjazd].push(zajecia);
                        });

                        for (const [nrZjazdu, zajeciaWzjezdzie] of Object.entries(zjazdyPogrupowane)) {
                            
                            const dostepneDaty = Object.values(zjazdyDaty[nrZjazdu]).sort();
                            const dataStart = dostepneDaty[0].split('-'); 
                            const dataKoniec = dostepneDaty[dostepneDaty.length - 1].split('-'); 
                            const zakresDat = `(${dataStart[2]}.${dataStart[1]} - ${dataKoniec[2]}.${dataKoniec[1]}.${dataKoniec[0]})`;

                            app.innerHTML += `
                                <div class="zjazd-header" onclick="toggleZjazd(${nrZjazdu})">
                                    <div class="zjazd-title-container">
                                        <span>Zjazd ${nrZjazdu}</span>
                                        <span class="zjazd-dates">${zakresDat}</span>
                                    </div>
                                    <span class="toggle-icon" id="icon-${nrZjazdu}" style="transform: rotate(-90deg);">▼</span>
                                </div>
                            `;

                            let zawartoscHTML = `<div class="zjazd-content" id="zjazd-content-${nrZjazdu}" style="display: none;">`;
                            
                            let obecnaData = '';

                            zajeciaWzjezdzie.forEach(zajecia => {
                                if (zajecia.data !== obecnaData) {
                                    const parts = zajecia.data.split('-');
                                    const dataFormat = `${parts[2]}.${parts[1]}.${parts[0]}`;
                                    zawartoscHTML += `<div class="dzien-header">${zajecia.dzien} <span style="font-weight:400; font-size:0.9rem;">(${dataFormat})</span></div>`;
                                    obecnaData = zajecia.data;
                                }

                                const typHTML = getTypZajecHTML(zajecia.przedmiot);
                                const czystaNazwa = cleanNazwa(zajecia.przedmiot);

                                zawartoscHTML += `
                                    <div class="zajecia-card">
                                        <div class="czas-col">
                                            <div class="czas-start">${zajecia.od}</div>
                                            <div class="czas-koniec">${zajecia.do}</div>
                                        </div>
                                        <div class="info-col">
                                            <h3 class="przedmiot-tytul">${czystaNazwa}</h3>
                                            <div class="tags-container">
                                                <span class="badge badge-sala">📍 Sala ${zajecia.sala}</span>
                                                ${typHTML}
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });

                            zawartoscHTML += `</div>`; 
                            app.innerHTML += zawartoscHTML; 
                        }

                        if (suroweZajecia.length === 0) {
                            app.innerHTML = '<div class="loader">Brak zajęć do wyświetlenia.</div>';
                        }
                    },
                    error: function(err) {
                        document.getElementById('plan-zajec').innerHTML = `<div class="loader" style="color:red;">Błąd pobierania arkusza: ${err.message}</div>`;
                    }
                });
            } catch (err) {
                document.getElementById('plan-zajec').innerHTML = `<div class="loader" style="color:red;">Błąd: ${err.message}</div>`;
            }
        });

        // ==========================================
        // 2. FUNKCJE DLA KOMUNIKATÓW RSS (Azure Proxy)
        // ==========================================
        const keywords = [
            'z201', 
            'z-201', 
            'egzamin',
            'egzaminacyjna',
            'sesja',
            'cieślak',
            'z201-205',
        ];

        window.toggleRSS = function() {
            const content = document.getElementById('rss-content');
            const icon = document.getElementById('rss-toggle-icon');
            if (content.style.display === 'none' || content.style.display === '') {
                content.style.display = 'block';
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'none';
                icon.style.transform = 'rotate(-90deg)';
            }
        }

        async function ladujKomunikaty() {
            try {
                // Link do Twojego serwera na Azure!
                const proxyUrl = 'https://rss-z201-proxy-gpckayd0ckgqheb6.polandcentral-01.azurewebsites.net/api/HttpTrigger1';                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Serwer proxy nie odpowiedział poprawnie.');
                
                // Pobieramy surowy tekst XML
                const xmlText = await response.text();
                
                // Nasz własny parser XML w przeglądarce
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // Pobieramy wszystkie tagi <item> (czyli pojedyncze komunikaty)
                const items = Array.from(xmlDoc.querySelectorAll("item"));
                
                const contentDiv = document.getElementById('rss-content');
                const countSpan = document.getElementById('rss-count');

                if (items.length > 0) {
                    // Filtrujemy komunikaty
                    const dopasowaneKomunikaty = items.filter(item => {
                        const tytul = (item.querySelector("title")?.textContent || "").toLowerCase();
                        const tresc = (item.querySelector("description")?.textContent || "").toLowerCase();
                        
                        return keywords.some(slowo => tytul.includes(slowo.toLowerCase()) || tresc.includes(slowo.toLowerCase()));
                    });

                    countSpan.innerText = dopasowaneKomunikaty.length;
                    
                    if (dopasowaneKomunikaty.length > 0) {
                        let html = '';
                        // Bierzemy max 5 najnowszych pasujących
                        dopasowaneKomunikaty.slice(0, 5).forEach(item => {
                            const title = item.querySelector("title")?.textContent;
                            const link = item.querySelector("link")?.textContent;
                            const pubDateRaw = item.querySelector("pubDate")?.textContent;
                            
                            // Pobieramy treść i pancernie ucinamy stopkę uczelnianą (nawet z enterami)
                            let description = item.querySelector("description")?.textContent || "";
                            description = description.replace(/<p>\s*Artykuł[\s\S]*?Panel Studenta WWSI.*?<\/p>/gi, '').trim();
                            
                            const pubDate = new Date(pubDateRaw);
                            const formatData = pubDate.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            
                            html += `
                                <div class="zajecia-card rss-card">
                                    <div class="czas-col">
                                        <div class="czas-start">${formatData}</div>
                                    </div>
                                    <div class="info-col">
                                        <h3 class="przedmiot-tytul">
                                            <a href="${link}" target="_blank" rel="noopener noreferrer">${title}</a>
                                        </h3>
                                        <div class="komunikat-tresc" style="margin-top: 10px; font-size: 0.9em; line-height: 1.4; opacity: 0.9;">
                                            ${description}
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        contentDiv.innerHTML = html;
                    } else {
                        contentDiv.innerHTML = '<div style="padding: 15px; text-align: center; color: var(--text-muted); font-weight: 600;">Brak nowych komunikatów dla grupy Z-201. 😎</div>';
                    }
                } else {
                    contentDiv.innerHTML = '<div style="padding: 15px; text-align: center;">Uczelnia nie udostępnia żadnych komunikatów.</div>';
                }
            } catch (error) {
                console.error("Błąd pobierania RSS:", error);
                document.getElementById('rss-content').innerHTML = '<div style="padding: 15px; text-align: center; color: #e74c3c; font-weight: 600;">Nie udało się pobrać komunikatów z WWSI.</div>';
            }
        }

        // Uruchamiamy pobieranie po załadowaniu strony
        document.addEventListener('DOMContentLoaded', () => {
            ladujKomunikaty();
        });
    </script>
</body>
</html>
